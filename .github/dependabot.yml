version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "nuget"
    # Scoped to `tests/` because `phenotype-water.csproj` declares zero
    # `<PackageReference>` items (it only references the local
    # `UnityEngine.CoreModule.dll` via `<Reference>`); the only NuGet
    # dependencies in the repo are xunit + the dotnet test SDK in the
    # test project. As long as the library has no consumer-facing
    # NuGet deps, `tests/` is the right scope. If a NuGet dep is added
    # to the library later, add a second `nuget` block here with
    # `directory: "/"` and a larger PR limit so library and test
    # updates can flow independently.
    directory: "/tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
