name: dotnet test

on:
  push:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: dotnet test (net48)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore phenotype-water.slnx

      - name: Build
        run: dotnet build phenotype-water.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/phenotype-water.tests.csproj -c Release --no-build --verbosity normal
