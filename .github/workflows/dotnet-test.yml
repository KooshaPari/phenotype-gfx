name: dotnet test

on:
  push:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: dotnet test (net48)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # The library and test project both reference UnityEngine.CoreModule.dll
      # with a hardcoded absolute Windows path
      # (C:\Program Files (x86)\Steam\steamapps\common\worldbox\worldbox_Data\Managed\...).
      # On a Linux runner that path is invalid, so without a stub the build
      # would fail with a confusing "Could not resolve this reference" error
      # buried in MSBuild output. The right long-term fix is to make the
      # HintPath portable (e.g. `$(WorldBoxManaged)/UnityEngine.CoreModule.dll`
      # like phenotype-terrain already does) and add a Directory.Build.targets
      # that substitutes the variable, but that's a substantive contract
      # change that needs sign-off from the package owner. Until then, this
      # step fails fast with an actionable message instead of a noisy MSBuild
      # trace.
      - name: Check for Unity reference resolution
        run: |
          if [ -z "${WORLDBOXMANAGED:-}" ]; then
            echo "::error::phenotype-water CI requires UnityEngine.CoreModule.dll."
            echo "::error::The .csproj HintPath is hardcoded to a Windows path that does not exist on a Linux runner."
            echo "::error::Either (a) set the WorldBoxManaged env var to a directory containing UnityEngine.CoreModule.dll, or (b) refactor the .csproj to use \$(WorldBoxManaged)/UnityEngine.CoreModule.dll and add a Directory.Build.targets that substitutes the variable when it's set."
            exit 1
          fi

      - name: Restore
        run: dotnet restore phenotype-water.slnx

      - name: Build
        run: dotnet build phenotype-water.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/phenotype-water.tests.csproj -c Release --no-build --verbosity normal
