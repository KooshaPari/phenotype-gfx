name: dotnet test

on:
  push:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: dotnet test (net48)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # The library references UnityEngine.CoreModule.dll under $(WorldBoxManaged);
      # the variable is not set in CI, so we compile a minimal stub assembly that
      # exposes just enough of the UnityEngine namespace for the project to compile.
      # The stub is a real PE-format .NET 8.0 assembly.
      - name: Stub UnityEngine.CoreModule
        run: |
          set -euo pipefail
          mkdir -p _stub
          cat > _stub/Stub.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net8.0</TargetFramework>
              <AssemblyName>UnityEngine.CoreModule</AssemblyName>
              <RootNamespace>UnityEngine</RootNamespace>
            </PropertyGroup>
          </Project>
          EOF
          cat > _stub/Vector3.cs <<'EOF'
          namespace UnityEngine
          {
              public struct Vector3
              {
                  public float x, y, z;
                  public Vector3(float x, float y, float z) { this.x = x; this.y = y; this.z = z; }
              }
          }
          EOF
          cat > _stub/Vector2.cs <<'EOF'
          namespace UnityEngine
          {
              public struct Vector2
              {
                  public float x, y;
                  public Vector2(float x, float y) { this.x = x; this.y = y; }
              }
          }
          EOF
          dotnet build _stub/Stub.csproj -c Release --nologo
          echo "WorldBoxManaged=$(pwd)/_stub/bin/Release/net8.0" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore phenotype-water.slnx

      - name: Build
        run: dotnet build phenotype-water.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/phenotype-water.tests.csproj -c Release --no-build --verbosity normal

      - name: Format
        run: dotnet format --verify-no-changes --verbosity diagnostic
