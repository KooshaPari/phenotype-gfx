name: dotnet build

on:
  push:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: dotnet build (net48)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@1152a9d9ff5fde9bcb0de213610eb1c1f73e57a1 # v4
        with:
          dotnet-version: 8.0.x

      # The library references UnityEngine.CoreModule.dll under $(WorldBoxManaged);
      # the variable is not set in CI, so we generate a minimal stub assembly locally.
      - name: Stub UnityEngine.CoreModule
        run: |
          set -euo pipefail
          bash scripts/generate-unity-stub.sh

      - name: Restore
        run: dotnet restore phenotype-terrain.csproj

      - name: Build
        run: dotnet build phenotype-terrain.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/phenotype-terrain.tests.csproj -c Release --verbosity normal

      - name: Format
        run: dotnet format --verify-no-changes --verbosity diagnostic
