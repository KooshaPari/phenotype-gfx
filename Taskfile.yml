version: "3"

vars:
  CRATE: phenotype-voxel
  FEATURES: ""

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  check:
    desc: "Type-check the crate"
    cmds:
      - cargo check --workspace --all-features

  build:
    desc: "Build all crates"
    cmds:
      - cargo build --workspace --all-features

  test:
    desc: "Run tests"
    cmds:
      - cargo test --workspace --all-features

  fmt:
    desc: "Format code"
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: "Check formatting without changing"
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: "Lint with clippy"
    cmds:
      - cargo clippy --workspace --all-features --all-targets -- -D warnings

  fix:
    desc: "Auto-fix clippy + fmt"
    cmds:
      - cargo fmt --all
      - cargo clippy --workspace --all-features --all-targets --fix --allow-dirty --allow-staged

  audit:
    desc: "Security advisory check"
    cmds:
      - cargo audit

  deny:
    desc: "Check dependency licenses and security advisories"
    cmds:
      - cargo deny check

  outdated:
    desc: "Check for outdated dependencies"
    cmds:
      - cargo outdated

  quality:
    desc: "Full quality gate: check, lint, test, deny"
    deps: [check, fmt-check, lint, test, deny]

  bench:
    desc: "Run benchmarks"
    cmds:
      - cargo bench --workspace

  docs:
    desc: "Build documentation"
    cmds:
      - cargo doc --workspace --no-deps
