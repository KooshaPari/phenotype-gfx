[package]
name = "phenotype-voxel"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
description = "Adaptive voxel substrate for Phenotype-org games: SVO + dense leaf chunks, deterministic dirty queue, per-engine mesher trait"
authors = ["Phenotype-org"]
repository = "https://github.com/KooshaPari/phenotype-voxel"
readme = "README.md"
keywords = ["voxel", "octree", "mesh", "gamedev"]
categories = ["game-engines", "data-structures"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
bytemuck = "1"
thiserror = "1"
bevy = { version = "0.18.1", default-features = false, features = ["bevy_asset", "bevy_mesh"], optional = true }

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"

[[bench]]
name = "voxelizer_bench"
harness = false

[[bench]]
name = "mesher_compare"
harness = false

[[bench]]
name = "perf_suite"
harness = false

[[example]]
name = "consume_mesh"
path = "examples/consume_mesh.rs"

[features]
default = []
bevy = ["dep:bevy"]
godot-ffi = []
unreal-ffi = []
[workspace]
