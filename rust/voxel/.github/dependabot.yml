version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      rust-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 5
